<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 320" width="680" height="320">
  <title>ストーリーグラフ背景 - きのこ2025登壇</title>

  <!-- 背景 -->
  <rect width="680" height="320" fill="#64B4D4"/>

  <!-- Y axis labels -->
  <text font-family="sans-serif" font-size="12" font-weight="bold" fill="#ffffff" x="28" y="72" text-anchor="middle" dominant-baseline="central">元気</text>
  <text font-family="sans-serif" font-size="12" font-weight="bold" fill="#ffffff" x="28" y="238" text-anchor="middle" dominant-baseline="central">しんどい</text>

  <!-- Axes -->
  <line x1="60" y1="40" x2="60" y2="260" stroke="#ffffff" stroke-width="0.8"/>
  <line x1="60" y1="260" x2="650" y2="260" stroke="#ffffff" stroke-width="0.8"/>

  <!-- Reference dashed line -->
  <line x1="60" y1="95" x2="645" y2="95" stroke="rgba(255,255,255,0.5)" stroke-width="0.8" stroke-dasharray="4 4"/>
  <text font-family="sans-serif" font-size="11" fill="rgba(255,255,255,0.8)" x="66" y="88" text-anchor="start" dominant-baseline="central">去年と同レベル</text>

  <!-- Story curve -->
  <path d="M120,95 C170,95 210,145 260,168 C310,185 340,228 370,232 C390,234 405,233 420,232 C445,200 500,128 560,102 L620,95" fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Current position vertical line -->
  <line x1="120" y1="40" x2="120" y2="260" stroke="#ffffff" stroke-width="1.5" stroke-dasharray="4 4" opacity="0.7"/>

  <!-- Dots -->

  <circle cx="120" cy="95" r="9" fill="none" stroke="#ffffff" stroke-width="2"/>
  <circle cx="120" cy="95" r="6" fill="#534AB7"/>
  <circle cx="260" cy="168" r="5" fill="#64B4D4" stroke="#ffffff" stroke-width="2"/>
  <circle cx="370" cy="232" r="5" fill="#64B4D4" stroke="#ffffff" stroke-width="2"/>
  <circle cx="420" cy="232" r="5" fill="#64B4D4" stroke="#ffffff" stroke-width="2"/>
  <circle cx="560" cy="102" r="5" fill="#64B4D4" stroke="#ffffff" stroke-width="2"/>
  <circle cx="620" cy="95" r="5" fill="#64B4D4" stroke="#ffffff" stroke-width="2"/>

  <!-- X axis ticks -->
  <line x1="120" y1="257" x2="120" y2="263" stroke="#ffffff" stroke-width="0.8"/>
  <line x1="260" y1="257" x2="260" y2="263" stroke="#ffffff" stroke-width="0.8"/>
  <line x1="370" y1="257" x2="370" y2="263" stroke="#ffffff" stroke-width="0.8"/>
  <line x1="420" y1="257" x2="420" y2="263" stroke="#ffffff" stroke-width="0.8"/>
  <line x1="560" y1="257" x2="560" y2="263" stroke="#ffffff" stroke-width="0.8"/>
  <line x1="620" y1="257" x2="620" y2="263" stroke="#ffffff" stroke-width="0.8"/>

  <!-- X axis labels -->
  <text font-family="sans-serif" font-size="12" font-weight="bold" fill="#ffffff" x="120" y="274" text-anchor="middle">きのこ2025</text>
  <text font-family="sans-serif" font-size="12" font-weight="bold" fill="#ffffff" x="120" y="287" text-anchor="middle">登壇</text>
  <text font-family="sans-serif" font-size="12" font-weight="bold" fill="#ffffff" x="260" y="274" text-anchor="middle">組織変化</text>
  <text font-family="sans-serif" font-size="12" font-weight="bold" fill="#ffffff" x="370" y="274" text-anchor="middle">年末年始</text>
  <text font-family="sans-serif" font-size="12" font-weight="bold" fill="#ffffff" x="370" y="287" text-anchor="middle">直前（底）</text>
  <text font-family="sans-serif" font-size="12" font-weight="bold" fill="#ffffff" x="420" y="274" text-anchor="middle">本との</text>
  <text font-family="sans-serif" font-size="12" font-weight="bold" fill="#ffffff" x="420" y="287" text-anchor="middle">出会い</text>
  <text font-family="sans-serif" font-size="12" font-weight="bold" fill="#ffffff" x="560" y="274" text-anchor="middle">チーム移動</text>
  <text font-family="sans-serif" font-size="12" font-weight="bold" fill="#ffffff" x="620" y="274" text-anchor="middle">今</text>
</svg>