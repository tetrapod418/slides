<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 320" width="680" height="320">
  <title>ストーリーグラフ背景 - チーム移動</title>

  <!-- Y axis labels -->
  <text font-family="sans-serif" font-size="12" fill="#ccc" x="28" y="72" text-anchor="middle" dominant-baseline="central">元気</text>
  <text font-family="sans-serif" font-size="12" fill="#ccc" x="28" y="238" text-anchor="middle" dominant-baseline="central">しんどい</text>

  <!-- Axes -->
  <line x1="60" y1="40" x2="60" y2="260" stroke="#ddd" stroke-width="0.5"/>
  <line x1="60" y1="260" x2="650" y2="260" stroke="#ddd" stroke-width="0.5"/>

  <!-- Reference dashed line -->
  <line x1="60" y1="95" x2="645" y2="95" stroke="#ddd" stroke-width="0.5" stroke-dasharray="4 4"/>
  <text font-family="sans-serif" font-size="11" fill="#ddd" x="54" y="95" text-anchor="end" dominant-baseline="central">去年と同レベル</text>

  <!-- Story curve -->
  <path d="M120,95 C170,95 200,135 250,155 C300,175 330,215 360,230 C390,245 420,195 460,158 C500,125 530,108 560,102 L620,95" fill="none" stroke="#bbb" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Current position vertical line -->
  <line x1="560" y1="40" x2="560" y2="260" stroke="#1D9E75" stroke-width="1.5" stroke-dasharray="4 4" opacity="0.7"/>

  <!-- Dots -->
  <circle cx="120" cy="95" r="4" fill="#ccc"/>
  <circle cx="250" cy="155" r="4" fill="#ccc"/>
  <circle cx="360" cy="230" r="4" fill="#ccc"/>
  <circle cx="460" cy="158" r="4" fill="#ccc"/>
  <circle cx="560" cy="102" r="8" fill="white"/>
  <circle cx="560" cy="102" r="6" fill="#1D9E75"/>
  <circle cx="620" cy="95" r="4" fill="#ccc"/>

  <!-- X axis ticks -->
  <line x1="120" y1="257" x2="120" y2="263" stroke="#ddd" stroke-width="0.5"/>
  <line x1="250" y1="257" x2="250" y2="263" stroke="#ddd" stroke-width="0.5"/>
  <line x1="360" y1="257" x2="360" y2="263" stroke="#ddd" stroke-width="0.5"/>
  <line x1="460" y1="257" x2="460" y2="263" stroke="#ddd" stroke-width="0.5"/>
  <line x1="560" y1="257" x2="560" y2="263" stroke="#ddd" stroke-width="0.5"/>
  <line x1="620" y1="257" x2="620" y2="263" stroke="#ddd" stroke-width="0.5"/>

  <!-- X axis labels -->
  <text font-family="sans-serif" font-size="12" fill="#ccc" x="120" y="274" text-anchor="middle">きのこ2025</text>
  <text font-family="sans-serif" font-size="12" fill="#ccc" x="120" y="287" text-anchor="middle">登壇</text>
  <text font-family="sans-serif" font-size="12" fill="#ccc" x="250" y="274" text-anchor="middle">組織変化</text>
  <text font-family="sans-serif" font-size="12" fill="#ccc" x="360" y="274" text-anchor="middle">年末年始</text>
  <text font-family="sans-serif" font-size="12" fill="#ccc" x="360" y="287" text-anchor="middle">直前（底）</text>
  <text font-family="sans-serif" font-size="12" fill="#ccc" x="460" y="274" text-anchor="middle">本との</text>
  <text font-family="sans-serif" font-size="12" fill="#ccc" x="460" y="287" text-anchor="middle">出会い</text>
  <text font-family="sans-serif" font-size="12" fill="#ccc" x="560" y="274" text-anchor="middle">チーム移動</text>
  <text font-family="sans-serif" font-size="12" fill="#ccc" x="622" y="274" text-anchor="middle">今</text>
</svg>